apiVersion: apps/v1
kind: Deployment

metadata:
  name: shopease
  namespace: ecommerce

spec:
  replicas: 3

  selector:
    matchLabels:
      app: shopease

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: shopease

    spec:
      containers:
      - name: shopease
        image: sanjanadas/shopease:v1

        ports:
        - containerPort: 5000

        readinessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5

        livenessProbe:
          httpGet:
            path: /health
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
